<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Year Navigator</title>
  
  <link rel="stylesheet" href="project.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>
<body class="h-full">
  <div id="app" class="w-full h-full overflow-auto relative" style="background: #0f172a;">
    
    <div class="absolute top-6 left-6 z-50">
      <span class="heading-font text-2xl font-800" style="color: #f8fafc;">Optuser Studies</span>
    </div>
    
    <a href="pay.html" class="absolute top-6 right-6 inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-600 transition-transform hover:scale-105 z-50 shadow-lg cursor-pointer" style="background: linear-gradient(145deg, #3b82f6, #2563eb); color: #f8fafc; border: 1px solid rgba(96,165,250,0.5);">
      <i data-lucide="credit-card" style="width:16px;height:16px;"></i>
      Payment
    </a>
    
    <div id="page-home" class="w-full min-h-full flex flex-col items-center justify-center px-4 py-12">
      <div class="text-center mb-12 animate-in" style="animation-delay: 0.1s;">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full mb-6" style="background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25);">
          <i data-lucide="graduation-cap" style="width:18px;height:18px;color:#fbbf24;"></i> 
          <span class="text-sm font-medium" style="color:#fbbf24;">Academic Portal</span>
        </div>
        <h1 id="main-title" class="heading-font text-4xl md:text-5xl lg:text-6xl font-800 mb-4" style="color:#f8fafc;">Welcome to Optusers</h1>
        <p id="subtitle" class="text-lg md:text-xl max-w-xl mx-auto" style="color:#94a3b8;">Select your year to view Notes and lectures</p>
      </div>
      
      <div class="text-center mb-10 w-full animate-in" style="animation-delay: 0.15s;">
        <p class="text-xl md:text-2xl font-bold mb-4" style="color: #6ee7b7;">Gateway Classes all lectures and notes 29 rupees</p>
        <a href="pay.html" class="inline-flex items-center gap-2 px-8 py-3 rounded-xl font-bold shadow-lg transition-transform hover:scale-105 cursor-pointer" style="background: #00baf2; color: #ffffff;">
          Click here to Pay
        </a>
      </div>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 max-w-5xl w-full px-2">
        <div class="year-card rounded-2xl p-6 text-center animate-in cursor-pointer" style="animation-delay:0.2s; background:linear-gradient(145deg,#1e3a5f,#1a2e4a); border:1px solid rgba(59,130,246,0.3);" onclick="showYear(1)">
          <div class="w-16 h-16 rounded-xl mx-auto mb-4 flex items-center justify-center" style="background:rgba(59,130,246,0.15);">
            <span class="heading-font text-3xl font-700" style="color:#60a5fa;">1</span>
          </div>
          <h3 class="text-lg font-700 mb-1" style="color:#f1f5f9;">First Year</h3>
          <p class="text-sm" style="color:#64748b;"></p>
          <div class="mt-4 flex items-center justify-center gap-1 text-sm font-500" style="color:#60a5fa;">
            <span>View subjects</span><i data-lucide="arrow-right" style="width:14px;height:14px;"></i>
          </div>
        </div>
        
        <div class="year-card rounded-2xl p-6 text-center animate-in cursor-pointer" style="animation-delay:0.3s; background:linear-gradient(145deg,#2d1f3d,#231a35); border:1px solid rgba(168,85,247,0.3);" onclick="showYear(2)">
          <div class="w-16 h-16 rounded-xl mx-auto mb-4 flex items-center justify-center" style="background:rgba(168,85,247,0.15);">
            <span class="heading-font text-3xl font-700" style="color:#c084fc;">2</span>
          </div>
          <h3 class="text-lg font-700 mb-1" style="color:#f1f5f9;">Second Year</h3>
          <p class="text-sm" style="color:#64748b;"></p>
          <div class="mt-4 flex items-center justify-center gap-1 text-sm font-500" style="color:#c084fc;">
            <span>View subjects</span><i data-lucide="arrow-right" style="width:14px;height:14px;"></i>
          </div>
        </div>
        
        <div class="year-card rounded-2xl p-6 text-center animate-in cursor-pointer" style="animation-delay:0.4s; background:linear-gradient(145deg,#1a3a2a,#152e22); border:1px solid rgba(52,211,153,0.3);" onclick="showYear(3)">
          <div class="w-16 h-16 rounded-xl mx-auto mb-4 flex items-center justify-center" style="background:rgba(52,211,153,0.15);">
            <span class="heading-font text-3xl font-700" style="color:#6ee7b7;">3</span>
          </div>
          <h3 class="text-lg font-700 mb-1" style="color:#f1f5f9;">Third Year</h3>
          <p class="text-sm" style="color:#64748b;"></p>
          <div class="mt-4 flex items-center justify-center gap-1 text-sm font-500" style="color:#6ee7b7;">
            <span>View subjects</span><i data-lucide="arrow-right" style="width:14px;height:14px;"></i>
          </div>
        </div>
        
        <div class="year-card rounded-2xl p-6 text-center animate-in cursor-pointer" style="animation-delay:0.5s; background:linear-gradient(145deg,#3b2314,#2e1b10); border:1px solid rgba(251,146,60,0.3);" onclick="showYear(4)">
          <div class="w-16 h-16 rounded-xl mx-auto mb-4 flex items-center justify-center" style="background:rgba(251,146,60,0.15);">
            <span class="heading-font text-3xl font-700" style="color:#fdba74;">4</span>
          </div>
          <h3 class="text-lg font-700 mb-1" style="color:#f1f5f9;">Fourth Year</h3>
          <p class="text-sm" style="color:#64748b;"></p>
          <div class="mt-4 flex items-center justify-center gap-1 text-sm font-500" style="color:#fdba74;">
            <span>View subjects</span><i data-lucide="arrow-right" style="width:14px;height:14px;"></i>
          </div>
        </div>
      </div>
    </div>
    
    <div id="page-subjects" class="w-full min-h-full px-4 py-10 hidden">
      <div class="max-w-3xl mx-auto">
        <button onclick="goHome()" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-500 mb-8 slide-in cursor-pointer" style="color:#94a3b8; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);"> 
          <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Back to years 
        </button>
        <div class="mb-10">
          <span id="year-badge" class="inline-block px-3 py-1 rounded-full text-xs font-600 mb-3"></span>
          <h2 id="year-title" class="heading-font text-3xl md:text-4xl font-700 mb-2" style="color:#f8fafc;"></h2>
          <p id="year-desc" class="text-base" style="color:#64748b;"></p>
        </div>
        <div id="subjects-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
      </div>
    </div>
    
  </div>

  <script src="proj.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
